<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>

    <style>

        body {
            font-family: Arial;
            background-color: #e9edf2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 12px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        input,
        select {
            padding: 8px;
            border: 1px solid #ccc;
            
            border-radius: 6px;
            width: 100px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }

        button:hover {
            background-color: #0d65d9;
        }

        .result-box {
            margin-top: 15px;
            background: #f1f3f5;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }

        .result-text {
            color: green;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>Mini Calculator</h2>

        <div class="inputs">

            <input type="number" id="num1" >

            <select id="operator">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">÷</option>
            </select>

            <input type="number" id="num2" >

        </div>

        <button onclick="calculate()">Calculate Amount</button>

        <div class="result-box">

            <span>Result:</span>

            <span id="result" class="result-text">0</span>

        </div>

    </div>

    <script>

        function calculate() {

            const num1 =
                Number(document.getElementById("num1").value);

            const num2 =
                Number(document.getElementById("num2").value);

            const operator =
                document.getElementById("operator").value;

            if (num1 ===" "|| num2 ===" "){
                resultbox.textContent="Please enter a number";
                return;
            }
            

            let result = 0;

            if (operator === "+") {

                result = num1 + num2;

            }

            else if (operator === "-") {

                result = num1 - num2;

            }

            else if (operator === "*") {

                result = num1 * num2;

            }

            else if (operator === "/") {

                result = num1 / num2;

            }

            document.getElementById("result").textContent = result;

        }

    </script>

</body>
</html>
